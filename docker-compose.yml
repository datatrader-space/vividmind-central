version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: vividmind_db
      POSTGRES_USER: vividmind_user
      POSTGRES_PASSWORD: supersecretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: gunicorn vividmind_central.wsgi:application --bind 0.0.0.0:8000 --workers 1
    volumes:
      - .:/app
      - static_volume:/app/static   # ensure static files are accessible to Nginx
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  celery:
    build: .
    command: celery -A vividmind worker -l info
    volumes:
      - .:/app
      - static_volume:/app/static
    depends_on:
      - web
      - redis
    env_file:
      - .env

  celery-beat:
    build: .
    command: celery -A vividmind beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - static_volume:/app/static
    depends_on:
      - web
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
  static_volume:  # shared volume for static files
